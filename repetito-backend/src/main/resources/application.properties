spring.application.name=repetito-backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.first-name=${ADMIN_FIRST_NAME:Администратор}
app.admin.last-name=${ADMIN_LAST_NAME:Системы}

telemost.api-url=${YANDEX_TELEMOST_API_URL}
telemost.token=${YANDEX_TELEMOST_TOKEN}
telemost.dev-mode=${YANDEX_TELEMOST_DEV_MODE}
